<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grip Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: sans-serif;
    padding:20px;
    max-width:500px;
    margin:auto;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    font-size:24px;
    border-radius:12px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:20px;
    border:none;
    border-radius:12px;
}

.stat{
    font-size:20px;
    margin:10px 0;
}
</style>
</head>

<body>

<div class="card">
    <h1>Grip Tracker</h1>

    <input type="number" id="gripInput" placeholder="Enter grip strength">

    <button onclick="saveGrip()">Save</button>
</div>

<div class="card">
    <div class="stat" id="todayChange"></div>
    <div class="stat" id="lastDeviation"></div>
</div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

<script>

let chart;

function getData(){
    return JSON.parse(localStorage.getItem("gripData") || "[]");
}

function saveData(data){
    localStorage.setItem("gripData", JSON.stringify(data));
}

function saveGrip(){

    const input = document.getElementById("gripInput");
    const value = parseFloat(input.value);

    if(!value) return;

    let data = getData();

    data.push({
        value:value,
        time:new Date().toISOString()
    });

    saveData(data);

    input.value = "";

    updateUI();
}

function updateUI(){

    let data = getData();

    if(data.length === 0) return;

    const latest = data[data.length-1];

    // Last deviation
    let deviationText = "No previous data";

    if(data.length > 1){
        const prev = data[data.length-2];

        const diff = latest.value - prev.value;

        deviationText =
            `Last deviation: ${diff.toFixed(1)} kg`;
    }

    document.getElementById("lastDeviation").innerText =
        deviationText;

    // 7 day avg
    const now = new Date();

    const last7 = data.filter(d=>{
        const t = new Date(d.time);
        return (now - t) < 7*24*60*60*1000;
    });

    const avg =
        last7.reduce((a,b)=>a+b.value,0)
        / last7.length;

    const pct =
        ((latest.value - avg)/avg)*100;

    document.getElementById("todayChange").innerText =
        `vs 7d avg: ${pct.toFixed(1)}%`;

    // Graph
    const labels = data.map(d=>
        new Date(d.time).toLocaleDateString()
    );

    const values = data.map(d=>d.value);

    if(chart){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById("chart"),
        {
            type:"line",
            data:{
                labels:labels,
                datasets:[{
                    label:"Grip Strength",
                    data:values
                }]
            }
        }
    );
}

updateUI();

</script>

</body>
</html>
