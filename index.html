<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grip Tracker Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f2f7;
    margin:0;
    padding:18px;
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:18px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

input, select{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    background:black;
    color:white;
}

.stat{
    font-size:18px;
    margin:8px 0;
}

.big{
    font-size:28px;
    font-weight:bold;
}

.green{ color:green; }
.orange{ color:orange; }
.red{ color:red; }

.small{
    font-size:14px;
    color:#666;
}

.entry{
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.factorItem{
    margin:8px 0;
}

</style>
</head>

<body>

<div class="card">

<h1>Grip Tracker Pro</h1>

<input type="number"
id="gripInput"
placeholder="Grip Strength (kg)">

<select id="handSelect">
<option value="Right">Right Hand</option>
<option value="Left">Left Hand</option>
</select>

<select id="modeSelect">
<option value="Morning">Morning</option>
<option value="Pre-training">Pre-training</option>
<option value="Post-training">Post-training</option>
</select>

<input type="datetime-local"
id="dateTimeInput">

<input type="number"
id="sleepInput"
placeholder="Sleep Hours">

<input type="number"
id="fatigueInput"
placeholder="Fatigue 1-10">

</div>

<div class="card">

<h2>Factors</h2>

<div id="factorChecklist"></div>

<input type="text"
id="customFactor"
placeholder="Add custom factor">

<button onclick="addCustomFactor()">
Add Factor
</button>

</div>

<div class="card">

<button onclick="saveGrip()">
Save Entry
</button>

<button onclick="exportData()">
Export Backup
</button>

<input type="file"
id="importFile"
accept=".json">

<button onclick="importData()">
Import Backup
</button>

</div>

<div class="card">

<div class="big"
id="readinessText"></div>

<div class="stat"
id="todayChange"></div>

<div class="stat"
id="lastDeviation"></div>

<div class="stat"
id="bestScore"></div>

<div class="stat"
id="symmetry"></div>

</div>

<div class="card">

<h2>Main Graph Filters</h2>

<select id="filterHand"
onchange="updateUI()">

<option value="All">
All Hands
</option>

<option value="Right">
Right Only
</option>

<option value="Left">
Left Only
</option>

</select>

<select id="filterMode"
onchange="updateUI()">

<option value="All">
All Modes
</option>

<option value="Morning">
Morning
</option>

<option value="Pre-training">
Pre-training
</option>

<option value="Post-training">
Post-training
</option>

</select>

<select id="filterFactor"
onchange="updateUI()">

<option value="All">
All Factors
</option>

</select>

</div>

<div class="card">

<h2>Grip Trend</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Correlation Analysis</h2>

<select id="correlationX"
onchange="updateCorrelationGraph()">

<option value="sleep">
Sleep
</option>

<option value="fatigue">
Fatigue
</option>

</select>

<canvas id="correlationChart"></canvas>

</div>

<div class="card">

<h2>Recent Entries</h2>

<div id="history"></div>

</div>

<script>

const defaultFactors = [

"Poor sleep",
"Hard training",
"DOMS",
"Stress",
"Caffeine",
"Injury/pain",
"Illness",
"Good recovery",
"Competition day",
"Shoulder fatigue",
"Leg fatigue"

];

let chart;
let correlationChart;
let editingIndex = null;

function getData(){

return JSON.parse(
localStorage.getItem("gripData") || "[]"
);
}

function saveData(data){

localStorage.setItem(
"gripData",
JSON.stringify(data)
);
}

function getFactors(){

return JSON.parse(
localStorage.getItem("customFactors")
|| "[]"
);
}

function renderFactors(){

const container =
document.getElementById(
"factorChecklist"
);

container.innerHTML = "";

const allFactors = [
...defaultFactors,
...getFactors()
];

allFactors.forEach(f=>{

container.innerHTML += `

<label class="factorItem">

<input
type="checkbox"
value="${f}">

${f}

</label>

`;
});

updateFilterFactors();
}

function updateFilterFactors(){

const select =
document.getElementById(
"filterFactor"
);

select.innerHTML = `
<option value="All">
All Factors
</option>
`;

const allFactors = [
...defaultFactors,
...getFactors()
];

allFactors.forEach(f=>{

select.innerHTML += `
<option value="${f}">
${f}
</option>
`;
});
}

function addCustomFactor(){

const input =
document.getElementById(
"customFactor"
);

const val = input.value.trim();

if(!val) return;

let factors = getFactors();

if(!factors.includes(val)){

factors.push(val);

localStorage.setItem(
"customFactors",
JSON.stringify(factors)
);
}

input.value = "";

renderFactors();
}

function exportData(){

const data = {

gripData:getData(),
customFactors:getFactors()

};

const blob = new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download =
"griptracker_backup.json";

a.click();

URL.revokeObjectURL(url);
}

function importData(){

const file =
document.getElementById(
"importFile"
).files[0];

if(!file){

alert("Select backup file");

return;
}

const reader = new FileReader();

reader.onload = function(e){

try{

const imported =
JSON.parse(e.target.result);

if(imported.gripData){

localStorage.setItem(
"gripData",
JSON.stringify(
imported.gripData
)
);
}

if(imported.customFactors){

localStorage.setItem(
"customFactors",
JSON.stringify(
imported.customFactors
)
);
}

renderFactors();
updateUI();

alert("Imported");

}catch{

alert("Invalid file");
}
};

reader.readAsText(file);
}

function clearForm(){

document.getElementById(
"gripInput"
).value = "";

document.getElementById(
"sleepInput"
).value = "";

document.getElementById(
"fatigueInput"
).value = "";

document.querySelectorAll(
'#factorChecklist input'
).forEach(x=>x.checked=false);

document.getElementById(
"dateTimeInput"
).value =
new Date(
Date.now()
- new Date().getTimezoneOffset()*60000
)
.toISOString()
.slice(0,16);
}

function saveGrip(){

const value =
parseFloat(
document.getElementById(
"gripInput"
).value
);

if(!value){

alert("Enter grip");

return;
}

const hand =
document.getElementById(
"handSelect"
).value;

const mode =
document.getElementById(
"modeSelect"
).value;

const sleep =
document.getElementById(
"sleepInput"
).value;

const fatigue =
document.getElementById(
"fatigueInput"
).value;

const customTime =
document.getElementById(
"dateTimeInput"
).value;

const checked =
[...document.querySelectorAll(
'#factorChecklist input:checked'
)]
.map(x=>x.value);

let data = getData();

const entry = {

value:value,
hand:hand,
mode:mode,
sleep:sleep,
fatigue:fatigue,
factors:checked,
time:new Date(customTime)
.toISOString()

};

if(editingIndex !== null){

data[editingIndex] = entry;

editingIndex = null;
}
else{

data.push(entry);
}

saveData(data);

clearForm();

updateUI();
}

function editEntry(index){

const data = getData();

const d = data[index];

editingIndex = index;

document.getElementById(
"gripInput"
).value = d.value;

document.getElementById(
"handSelect"
).value = d.hand;

document.getElementById(
"modeSelect"
).value = d.mode;

document.getElementById(
"sleepInput"
).value = d.sleep;

document.getElementById(
"fatigueInput"
).value = d.fatigue;

document.getElementById(
"dateTimeInput"
).value =
new Date(d.time)
.toISOString()
.slice(0,16);

document.querySelectorAll(
'#factorChecklist input'
).forEach(x=>{

x.checked =
d.factors?.includes(x.value);
});

window.scrollTo({
top:0,
behavior:"smooth"
});
}

function deleteEntry(index){

if(!confirm("Delete entry?"))
return;

let data = getData();

data.splice(index,1);

saveData(data);

updateUI();
}

function filterData(data){

const handFilter =
document.getElementById(
"filterHand"
).value;

const modeFilter =
document.getElementById(
"filterMode"
).value;

const factorFilter =
document.getElementById(
"filterFactor"
).value;

return data.filter(d=>{

let ok = true;

if(handFilter !== "All")
ok = ok && d.hand===handFilter;

if(modeFilter !== "All")
ok = ok && d.mode===modeFilter;

if(factorFilter !== "All")
ok = ok &&
d.factors?.includes(factorFilter);

return ok;
});
}

function updateCorrelationGraph(){

const data = getData();

const xType =
document.getElementById(
"correlationX"
).value;

const points = data
.filter(d=>d[xType])
.map(d=>({

x:Number(d[xType]),
y:d.value

}));

if(correlationChart)
correlationChart.destroy();

correlationChart =
new Chart(

document.getElementById(
"correlationChart"
),

{
type:"scatter",

data:{
datasets:[{

label:
"Grip Correlation",

data:points

}]
},

options:{

scales:{

x:{
title:{
display:true,
text:xType
}
},

y:{
title:{
display:true,
text:"Grip"
}
}

}
}
}
);
}

function updateUI(){

let data = getData();

if(data.length===0)
return;

const latest =
data[data.length-1];

let deviationText =
"No previous entry";

if(data.length>1){

const prev =
data[data.length-2];

const diff =
latest.value-prev.value;

deviationText =
"Deviation: " +
(diff>=0?"+":"") +
diff.toFixed(1) +
" kg";
}

document.getElementById(
"lastDeviation"
).innerText =
deviationText;

const now = new Date();

const last7 = data.filter(d=>{

const t = new Date(d.time);

return (
now - t
) < 7*24*60*60*1000;
});

const avg =
last7.reduce(
(a,b)=>a+b.value,0
)
/ last7.length;

const pct =
((latest.value-avg)/avg)*100;

document.getElementById(
"todayChange"
).innerText =
"vs 7d avg: " +
pct.toFixed(1) +
"%";

let readiness = "";
let readinessClass = "";

if(pct > 5){

readiness = "READY";
readinessClass = "green";
}
else if(pct < -5){

readiness = "FATIGUED";
readinessClass = "red";
}
else{

readiness = "NORMAL";
readinessClass = "orange";
}

const readyEl =
document.getElementById(
"readinessText"
);

readyEl.innerText =
readiness;

readyEl.className =
"big " + readinessClass;

const best =
Math.max(
...data.map(d=>d.value)
);

document.getElementById(
"bestScore"
).innerText =
"Best: " +
best.toFixed(1) +
" kg";

const left =
data.filter(
d=>d.hand==="Left"
).slice(-1)[0];

const right =
data.filter(
d=>d.hand==="Right"
).slice(-1)[0];

if(left && right){

const sym =
Math.abs(
left.value-right.value
)
/
(
(left.value+right.value)/2
)
*100;

document.getElementById(
"symmetry"
).innerText =
"Symmetry: " +
sym.toFixed(1) +
"%";
}

const filtered =
filterData(data);

const labels =
filtered.map(d=>
new Date(d.time)
.toLocaleDateString()
);

const values =
filtered.map(d=>d.value);

const movingAvg =
values.map((v,i,arr)=>{

const start =
Math.max(0,i-6);

const slice =
arr.slice(start,i+1);

return slice.reduce(
(a,b)=>a+b,0
)/slice.length;
});

if(chart)
chart.destroy();

chart = new Chart(

document.getElementById(
"chart"
),

{
type:"line",

data:{

labels:labels,

datasets:[

{
label:"Grip",
data:values
},

{
label:"7d Avg",
data:movingAvg
}

]
}
}
);

const history =
document.getElementById(
"history"
);

history.innerHTML = "";

const reversed =
[...data].reverse();

reversed.forEach(
(d,reverseIndex)=>{

const realIndex =
data.length-1
-reverseIndex;

history.innerHTML += `

<div class="entry">

<b>${d.value} kg</b>

• ${d.hand}

• ${d.mode}

<br>

<span class="small">

Sleep:
${d.sleep || "-"}

h |

Fatigue:
${d.fatigue || "-"}

|

${new Date(d.time)
.toLocaleString()}

</span>

<br>

<span>

Factors:
${d.factors?.join(", ")
|| "-"}

</span>

<br><br>

<button
onclick="editEntry(${realIndex})">

Edit

</button>

<button
onclick="deleteEntry(${realIndex})">

Delete

</button>

</div>

`;
});

updateCorrelationGraph();
}

renderFactors();

updateUI();

document.getElementById(
"dateTimeInput"
).value =
new Date(
Date.now()
- new Date().getTimezoneOffset()*60000
)
.toISOString()
.slice(0,16);

</script>

</body>
</html>
